<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="习概刷题练习页：自定义练习、错题练习、作答记录回看。" />
  <title>开始刷题 · 习概刷题网站</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="practice">
  <header class="site-header">
    <a class="brand brand-link" href="index.html" aria-label="返回首页">
      <span class="logo" aria-hidden="true">习</span>
      <div>
        <h1>开始刷题</h1>
        <p>独立答题页 · 错题专项 · 作答回看</p>
      </div>
    </a>
    <nav class="tabs" aria-label="主导航">
      <a class="tab link-tab" href="index.html#home">首页</a>
      <span class="tab active">开始刷题</span>
      <a class="tab link-tab" href="index.html#bank">题库检索</a>
      <a class="tab link-tab" href="index.html#saved">错题 / 收藏</a>
    </nav>
  </header>

  <main>
    <section class="view active">
      <div class="practice-shell">
        <aside class="controls card">
          <h2>练习设置</h2>
          <label>练习范围 / 章节
            <select id="unitFilter"></select>
          </label>
          <label>题型
            <select id="typeFilter">
              <option value="all">全部题型</option>
              <option value="single">单选题</option>
              <option value="multiple">多选题</option>
              <option value="judge">判断题</option>
            </select>
          </label>
          <label>题目来源
            <select id="poolFilter">
              <option value="all">全部题目</option>
              <option value="wrong">错题练习</option>
              <option value="starred">只刷收藏</option>
              <option value="unseen">优先未做</option>
            </select>
          </label>
          <label>出题顺序
            <select id="orderFilter">
              <option value="shuffle">随机</option>
              <option value="origin">原始顺序</option>
            </select>
          </label>
          <label>题目数量
            <input id="countInput" type="number" min="1" max="200" value="20" />
            <small class="form-hint" id="countHint">默认当前范围全部题</small>
          </label>
          <label class="toggle-line">
            <input id="effectsToggle" type="checkbox" checked />
            <span>开启答题彩带 / 震动效果</span>
          </label>
          <button class="primary full" id="startPractice">生成练习</button>
          <div class="mini-stats" id="practiceMiniStats"></div>
          <div class="side-note">
            <strong>多选题提醒</strong><br>
            多选题需要勾选完后点击“提交答案”，已取消双击提交，防止误判。
          </div>
        </aside>

        <section class="question-area card" aria-live="polite">
          <div id="questionBox" class="question-empty">
            <h2>还没有生成练习</h2>
            <p class="muted">选择左侧条件后点击“生成练习”。如果从错题本进入，会自动载入对应错题范围。</p>
          </div>
        </section>
      </div>
    </section>
  </main>

  <footer>
    <span>© 个人学习使用</span>
    <span>·</span>
    <span>共 <strong id="footerTotal">0</strong> 题</span>
  </footer>

  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
